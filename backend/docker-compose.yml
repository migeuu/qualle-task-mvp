version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qualle-task-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: qualle
      POSTGRES_PASSWORD: qualle123
      POSTGRES_DB: qualle_task_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
